    url: https://github.com/google/earthengine-api
    role: official_api_bindings_and_examples
    language: JavaScript/Python
    license: Apache-2.0
    harvest_level: metadata_and_patterns_only
    topics: [python_api, javascript_api, authentication, api_surface]

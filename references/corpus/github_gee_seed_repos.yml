schema_version: gee-corpus-seed/v0.3
created_at: 2026-06-23
purpose: >
  Seed inventory for building a pattern-only Google Earth Engine syntax and
  workflow corpus. Do not vendor or copy third-party source code into this
  repository. Use these repositories to derive small, attributed operator
  patterns, validation rules, and task coverage gaps.
discovery_methods:
  - GitHub repository search API queries for google-earth-engine, earthengine-api, ee.ImageCollection, and Earth Engine organizations.
  - Web search for Google Earth Engine GitHub examples across Sentinel, Landsat, flood mapping, LST, LandTrendr, and spectral-index tasks.
  - Curated GEE community resource lists used only as discovery pointers.
  - Maintainer and organization review of high-signal GEE educators and community projects, especially giswqs/opengeos and gee-community.
  - Paper-linked repository search from remote-sensing and geoscience publications, treated as metadata-only until license, DOI, data dependency, and reproducibility review pass.
selection_policy:
  license_required_for_code_ingestion: true
  default_ingestion_level: metadata_and_patterns_only
  priority_curators:
    - https://github.com/giswqs
    - https://github.com/opengeos
    - https://github.com/gee-community
  paper_linked_repository_policy:
    default_harvest_level: metadata_only_until_license_review
    required_metadata:
      - article_doi_or_publisher_url
      - repository_url
      - journal_or_venue
      - license
      - earth_engine_language
      - private_asset_dependency_check
      - reproducibility_scope
    target_venues:
      - IEEE Transactions on Geoscience and Remote Sensing
      - ISPRS Journal of Photogrammetry and Remote Sensing
      - International Journal of Applied Earth Observation and Geoinformation
      - Remote Sensing of Environment
      - Remote Sensing
  excluded_without_review:
    - repositories with unclear license when copying snippets would be required
    - notebooks or scripts that embed credentials, private assets, or one-off local paths
    - generated code dumps without explanatory context
quality_signals:
  - official Google or established community organization
  - clear license
  - maintained by a known GEE educator, package maintainer, or community organization
  - linked from a peer-reviewed article with DOI or publisher page
  - examples cover multiple Earth Engine operators or datasets
  - recent maintenance or durable educational value
  - task diversity across optical, SAR, LST, land cover, export, and time series workflows
repositories:

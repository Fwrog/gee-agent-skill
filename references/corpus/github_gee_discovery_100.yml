- full_name: NASA-DEVELOP/SAVeTrEE
  url: https://github.com/NASA-DEVELOP/SAVeTrEE
  description: 'SAVeTrEE is a script within Google Earth Engine for classifying areas
    of vegetation mortality. It prompts the user for a year, duration, and spectral
    index for which a mortality map should be produced, then fits a trend line to
    an imagery time sequence of vegetative spectral index values calculated from Landsat
    multispectral data. The slope of the trend line, as well as the spectral index
    values, are used in determining the final classification of each pixel within
    the study area. Classification categories are: 1) Growing 2) Mortality (declining)
    3) Stable Vegetation and 4) Stable Barren.'
  language: unknown
